<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="hero">
    <img id="catalogLogo" alt="Br.ino" src="/logo.svg" />
    <h1 id="catalogTitle">{{title}}</h1>
    <p id="catalogSubtitle">{{subtitle}}</p>
    <div id="catalogMeta" class="meta">{{teacher}} · {{klass}} · {{school}}</div>
  </div>

  <div class="wrap">
    <h2 id="modeTitle" style="text-align:center; font-size:20px; margin:0 0 20px;">{{modeTitle}}</h2>
    <div id="catalogContent"></div>
  </div>

  <div class="foot">Feito com 💚 pela Br.ino · Recompensas integradas ao ClassDojo</div>

  <!-- ORDER MODAL -->
  <div id="ordModal" class="ord-modal">
    <div class="ord-box">
      <button class="ord-x" id="ordX">✕</button>
      <div class="ord-emoji" id="ordEmoji">🎁</div>
      <p class="ord-lead" id="ordLead">Você escolheu</p>
      <div class="ord-prize" id="ordPrize"></div>
      <div class="ord-skill" id="ordSkill" style="display:none"></div>
      
      <label class="ord-lbl">Nome do ClassDojo</label>
      <input id="ordName" placeholder="Digite seu nome no ClassDojo" autocomplete="off">
      <button class="ord-send" id="ordSend">Enviar escolha</button>
      <div class="ord-done" id="ordDone">✅ Enviado! Agora fale com seu professor(a).</div>
    </div>
  </div>

  <iframe
    name="googleFormsReceiver"
    style="display: none;"
    title="Envio para o Google Forms">
  </iframe>

  <script>
    window.CATALOG_CONFIG = {{configJson}};
  </script>
  <script src="/js/catalog.js"></script>
</body>
</html>
